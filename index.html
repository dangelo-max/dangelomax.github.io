<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Index</title>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <audio id="audioPlayer" aria-label="Background music player" controls>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <div id="feedback"></div>
    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const feedback = document.getElementById('feedback');

        const updateVisualFeedback = () => {
            feedback.innerText = audioPlayer.paused ? 'Audio is paused' : 'Audio is playing';
        };

        audioPlayer.addEventListener('play', () => {
            updateVisualFeedback();
        });

        audioPlayer.addEventListener('pause', () => {
            updateVisualFeedback();
        });

        audioPlayer.addEventListener('error', () => {
            feedback.innerText = 'An error occurred while trying to play the audio. Please try again.';
        });

        window.addEventListener('error', (event) => {
            feedback.innerText = 'An unexpected error occurred: ' + event.message;
        });
    </script>
</body>
</html>
